    <script>
      (function () {
        const EVENT_CONFIG = {
          title: "Wedding: Shayam Sundar & Sruthi",
          location: "Raya Mahal, Kumbakonam",
          details:
            "Reception - 20 May 2026 (6:00 PM onwards), Wedding - 21 May 2026 (7:45 AM to 9:00 AM)",
          start: "2026-05-21T07:45:00+05:30",
          end: "2026-05-21T09:00:00+05:30",
        };
        const GALLERY_IMAGES = [
          "/gallery-optimized/01-copy-of-0c0a9886-1200.jpg",
          "/gallery-optimized/02-copy-of-0c0a9888-1200.jpg",
          "/gallery-optimized/03-copy-of-0c0a9894-1200.jpg",
          "/gallery-optimized/04-copy-of-9a4a5651-1200.jpg",
          "/gallery-optimized/05-copy-of-9a4a5953-1200.jpg",
          "/gallery-optimized/06-img-5755-1200.jpg",
          "/gallery-optimized/07-img-5795-1200.jpg",
          "/gallery-optimized/08-img-6033-1200.jpg",
        ];
        const HERO_BG_IMAGE = "/gallery-optimized/05-copy-of-9a4a5953-1200.jpg";

        function toGoogleDate(isoString) {
          const d = new Date(isoString);
          const y = d.getUTCFullYear();
          const m = String(d.getUTCMonth() + 1).padStart(2, "0");
          const day = String(d.getUTCDate()).padStart(2, "0");
          const hh = String(d.getUTCHours()).padStart(2, "0");
          const mm = String(d.getUTCMinutes()).padStart(2, "0");
          const ss = String(d.getUTCSeconds()).padStart(2, "0");
          return `${y}${m}${day}T${hh}${mm}${ss}Z`;
        }

        function createCalendarLinks() {
          const gStart = toGoogleDate(EVENT_CONFIG.start);
          const gEnd = toGoogleDate(EVENT_CONFIG.end);
          const googleUrl =
            "https://calendar.google.com/calendar/render?action=TEMPLATE" +
            "&text=" +
            encodeURIComponent(EVENT_CONFIG.title) +
            "&dates=" +
            encodeURIComponent(gStart + "/" + gEnd) +
            "&details=" +
            encodeURIComponent(EVENT_CONFIG.details) +
            "&location=" +
            encodeURIComponent(EVENT_CONFIG.location);

          const ics = [
            "BEGIN:VCALENDAR",
            "VERSION:2.0",
            "PRODID:-//Wedding Invite//EN",
            "BEGIN:VEVENT",
            "UID:shayam-sruthi-wedding@invite.local",
            "DTSTAMP:" + toGoogleDate(new Date().toISOString()),
            "DTSTART:" + gStart,
            "DTEND:" + gEnd,
            "SUMMARY:" + EVENT_CONFIG.title,
            "DESCRIPTION:" + EVENT_CONFIG.details,
            "LOCATION:" + EVENT_CONFIG.location,
            "END:VEVENT",
            "END:VCALENDAR",
          ].join("\\r\\n");

          const appleUrl = URL.createObjectURL(
            new Blob([ics], { type: "text/calendar;charset=utf-8" }),
          );
          return { googleUrl, appleUrl };
        }

        function insertSaveDateButtons() {
          if (document.querySelector(".save-date-wrap")) return;

          const headings = Array.from(document.querySelectorAll("h2"));
          const timelineHeading = headings.find((h) =>
            /Program Timeline|Day Program/i.test(h.textContent || ""),
          );
          if (!timelineHeading) return;

          const section = timelineHeading.closest("section");
          if (!section || !section.parentElement) return;

          const links = createCalendarLinks();
          const isApple = /iPhone|iPad|iPod|Macintosh/i.test(
            navigator.userAgent,
          );
          const wrap = document.createElement("div");
          wrap.className = "save-date-wrap";
          wrap.innerHTML = `
            <div class="save-date-label" style="color:#ffffff !important;font-weight:700;opacity:1;letter-spacing:0.26em;text-shadow:0 1px 2px rgba(0,0,0,0.45);">SAVE THE DATE</div>
            <div class="save-date-buttons">
              <a class="save-date-btn ${isApple ? "" : "active"}" href="${links.googleUrl}" target="_blank" rel="noopener">GOOGLE CALENDAR</a>
              <a class="save-date-btn ${isApple ? "active" : ""}" href="${links.appleUrl}" download="wedding-invite.ics">APPLE / ICAL</a>
            </div>
          `;
          section.insertAdjacentElement("afterend", wrap);
        }

        function addOurMomentsTitle() {
          const carouselImage = document.querySelector(
            'img[alt^="Wedding moment"]',
          );
          if (!carouselImage) return;
          const section = carouselImage.closest("section");
          if (!section || section.querySelector(".our-moments-header")) return;

          const title = document.createElement("div");
          title.className = "our-moments-header";
          title.innerHTML = `
            <div class="our-moments-kicker">Moments</div>
            <h2 class="our-moments-title">Our <em>Gallery</em></h2>
          `;
          section.insertAdjacentElement("afterbegin", title);
        }

        function replaceSlideshowWithStaticGrid() {
          const carouselImage = document.querySelector(
            'img[alt^="Wedding moment"]',
          );
          if (!carouselImage) return;
          const section = carouselImage.closest("section");
          if (!section || section.dataset.customGallery === "true") return;

          section.dataset.customGallery = "true";
          section.innerHTML = "";

          const header = document.createElement("div");
          header.className = "our-moments-header";
          header.innerHTML = `
            <div class="our-moments-kicker">Moments</div>
            <h2 class="our-moments-title">Our <em>Gallery</em></h2>
          `;

          const grid = document.createElement("div");
          grid.className = "our-moments-grid";
          GALLERY_IMAGES.forEach((src, index) => {
            const item = document.createElement("div");
            item.className = "our-moments-grid-item";
            item.innerHTML = `<img src="${src}" alt="Our moment ${index + 1}" loading="lazy" />`;
            grid.appendChild(item);
          });

          section.appendChild(header);
          section.appendChild(grid);
        }

        function moveGalleryAfterVenue() {
          const carouselImage = document.querySelector(
            'img[alt^="Wedding moment"]',
          );
          if (!carouselImage) return;
          const gallerySection = carouselImage.closest("section");
          if (!gallerySection) return;

          const venueHeading = Array.from(document.querySelectorAll("h2")).find(
            (h) => /Venue/i.test(h.textContent || ""),
          );
          if (!venueHeading) return;
          const venueSection = venueHeading.closest("section");
          if (!venueSection || !venueSection.parentElement) return;

          if (venueSection.nextElementSibling !== gallerySection) {
            venueSection.insertAdjacentElement("afterend", gallerySection);
          }
        }

        function removeUnwantedSections() {
          const removeTitles = new Set([
            "Dress Code",
            "Pre-Wedding Events",
            "Transportation",
            "Accommodation",
            "Gifts",
          ]);
          Array.from(document.querySelectorAll("h2")).forEach((h) => {
            const text = (h.textContent || "").trim();
            if (removeTitles.has(text)) {
              const section = h.closest("section");
              if (section) section.remove();
            }
          });
        }

        function applyHeroBackgroundImage() {
          let section = null;

          // First, try to find the section with "We're getting married" text
          const titleCandidates = Array.from(
            document.querySelectorAll("h2,h1,p"),
          );
          const marker = titleCandidates.find((el) =>
            /we'?re getting married/i.test((el.textContent || "").trim()),
          );
          if (marker) {
            section = marker.closest("section");
          }

          // Fallback: if not found, use the first section that appears to be a hero
          if (!section) {
            const allSections = Array.from(
              document.querySelectorAll("section"),
            );
            section =
              allSections.find((sec) => {
                const style = window.getComputedStyle(sec);
                const height = sec.offsetHeight;
                // Hero sections are typically taller and appear near the top
                return height > 300 && sec.offsetTop < 500;
              }) || allSections[0];
          }

          if (!section || section.dataset.heroBgApplied === "true") return;
          section.dataset.heroBgApplied = "true";
          section.style.backgroundRepeat = "no-repeat";
          section.style.backgroundSize = "cover";
          section.style.backgroundPosition = "center center";
          section.style.filter = "brightness(0.85) contrast(1.1)";

          const HERO_BG_MOBILE =
            "/gallery-optimized/05-copy-of-9a4a5982-mobile-800.jpg";

          function updateHeroBg() {
            if (window.innerWidth <= 768) {
              section.style.backgroundImage = `url('${HERO_BG_MOBILE}')`;
              section.style.backgroundPosition = "center 20%";
            } else {
              section.style.backgroundImage = `url('${HERO_BG_IMAGE}')`;
              section.style.backgroundPosition = "center center";
            }
          }
          updateHeroBg();
          window.addEventListener("resize", updateHeroBg);
        }

        function applyCustomizations() {
          removeUnwantedSections();
          addOurMomentsTitle();
          replaceSlideshowWithStaticGrid();
          moveGalleryAfterVenue();
          insertSaveDateButtons();
          applyHeroBackgroundImage();
        }

        const observer = new MutationObserver(applyCustomizations);
        observer.observe(document.body, { childList: true, subtree: true });
        applyCustomizations();
      })();
    </script>
